name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aip
          POSTGRES_PASSWORD: aip_ci
          POSTGRES_DB: aip_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/ --ignore E501,E402

      - name: Run tests (SQLite)
        working-directory: backend
        env:
          DB_PATH: ":memory:"
          SECRET_KEY: ci_test_secret_key_32_chars_here!
          REQUIRE_AUTH: "false"
        run: |
          pytest tests/ -v --tb=short

      - name: Run tests (PostgreSQL)
        working-directory: backend
        env:
          DATABASE_URL: postgresql://aip:aip_ci@localhost:5432/aip_test
          SECRET_KEY: ci_test_secret_key_32_chars_here!
          REQUIRE_AUTH: "false"
        run: |
          pytest tests/ -v --tb=short

  # ── Frontend build ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker build (on main only) ───────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aip-backend:${{ github.sha }} .
